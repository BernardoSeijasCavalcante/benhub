    <script>
        const originalFetch = window.fetch;

        window.fetch = (url, options) => {
            const CSRF_TOKEN_COOKIE_KEY = "XSRF-TOKEN";
            const CSRF_TOKEN_HEADER_KEY = "X-XSRF-TOKEN";
            const getCookieValue = (key) => {
                const cookie = document.cookie.split(';').find((cookie) => cookie.trim().startsWith(key));
                return cookie?.split("=")[1];
            };

            const updateFetchHeaders = (
                headers,
                headerKey,
                headerValue,
            ) => {
                if (headers instanceof Headers) {
                    headers.set(headerKey, headerValue);
                } else if (Array.isArray(headers)) {
                    headers.push([headerKey, headerValue]);
                } else if (headers) {
                    headers[headerKey] = headerValue;
                }
            };
            const csrfToken = getCookieValue(CSRF_TOKEN_COOKIE_KEY);
            if (csrfToken) {
                const {headers = new Headers()} = options || {};
                updateFetchHeaders(headers, CSRF_TOKEN_HEADER_KEY, decodeURI(csrfToken));
                return originalFetch(url, {
                    ...options,
                    headers,
                });
            }

            return originalFetch(url, options);
        };
    </script>

        docs.articles = [{"title":"Introdução","data":"<div class=\"container\">\n    <div class=\"tw-prose tw-prose-sm !tw-max-w-[1000ch]\">\n        <h2>Introdução</h2>\n\n        <p>Bem-vindo à documentação oficial da API Kolmeya. Aqui, você encontrará todas as informações necessárias para integrar, usar e tirar o máximo proveito de nossas funcionalidades.</p>\n\n        <p>Nossa API permite gerenciar envios de SMS, consultar relatórios, monitorar respostas e status, e muito mais. É projetada para oferecer desempenho, escalabilidade e facilidade de uso, permitindo que você incorpore comunicação eficiente em suas aplicações.</p>\n\n        <h2>Alguns recursos da API</h2>\n    </div>\n\n    <div class=\"tw-grid lg:tw-grid-cols-3 tw-gap-4 tw-mt-4\">\n        <a href=\"/docs/api/articles/autenticacao\" class=\"tw-border tw-rounded-lg tw-p-4 tw-flex tw-flex-col tw-gap-2 hover:tw-shadow-md\">\n            <i class=\"fad fa-lock tw-text-xl tw-text-[#724694]\"></i>\n            <h3 class=\"tw-text-xl tw-font-bold tw-text-zinc-900\">Autenticação</h3>\n            <p class=\"tw-text-sm tw-text-zinc-900/70\">\n                Entenda como se autenticar na API e gerenciar seu token de acesso\n            </p>\n        </a>\n\n        <a href=\"/docs/api/operations/sms.segments\" class=\"tw-border tw-rounded-lg tw-p-4 tw-flex tw-flex-col tw-gap-2 hover:tw-shadow-md\">\n            <i class=\"fad fa-layer-group tw-text-xl  tw-text-[#724694]\"></i>\n            <h3 class=\"tw-text-xl tw-font-bold\">Centros de Custo</h3>\n            <p class=\"tw-text-sm tw-text-zinc-900/70\">Visualize os centros de custos disponíveis para sua conta</p>\n        </a>\n\n        <a href=\"/docs/api/operations/sms.store\" class=\"tw-border tw-rounded-lg tw-p-4 tw-flex tw-flex-col tw-gap-2 hover:tw-shadow-md\">\n            <i class=\"fad fa-paper-plane tw-text-xl tw-text-[#724694]\"></i>\n            <h3 class=\"tw-text-xl tw-font-bold tw-text-zinc-900\">Envio de SMS</h3>\n            <p class=\"tw-text-sm tw-text-zinc-900/70\">Envie SMS de forma simples e rápida</p>\n        </a>\n\n        <a href=\"/docs/api/operations/sms.status.request\" class=\"tw-border tw-rounded-lg tw-p-4 tw-flex tw-flex-col tw-gap-2 hover:tw-shadow-md\">\n            <i class=\"fad fa-check-double tw-text-xl  tw-text-[#724694]\"></i>\n            <h3 class=\"tw-text-xl tw-font-bold\">Status</h3>\n            <p class=\"tw-text-sm tw-text-zinc-900/70\">Consulte o status de requisições ou mensagens</p>\n        </a>\n\n        <a href=\"/docs/api/operations/sms.reports.statuses\" class=\"tw-border tw-rounded-lg tw-p-4 tw-flex tw-flex-col tw-gap-2 hover:tw-shadow-md\">\n            <i class=\"fad fa-file-chart-column tw-text-xl  tw-text-[#724694]\"></i>\n            <h3 class=\"tw-text-xl tw-font-bold\">Relatórios</h3>\n            <p class=\"tw-text-sm tw-text-zinc-900/70\">Monitore e analise suas campanhas com dados detalhados</p>\n        </a>\n\n        <a href=\"/docs/api/operations/sms.balance\" class=\"tw-border tw-rounded-lg tw-p-4 tw-flex tw-flex-col tw-gap-2 hover:tw-shadow-md\">\n            <i class=\"fad fa-circle-dollar tw-text-xl tw-text-[#724694]\"></i>\n            <h3 class=\"tw-text-xl tw-font-bold\">Saldo</h3>\n            <p class=\"tw-text-sm tw-text-zinc-900/70\">\n                Consulte o saldo disponível para envio de mensagens\n            </p>\n        </a>\n    </div>\n</div>\n","uri":"/","type":"html"},{"title":"autenticação","data":"<div class=\"container\">\n    <div class=\"tw-rounded-lg\">\n        <div>\n            <div class=\"tw-prose tw-prose-sm !tw-max-w-[1000ch]\">\n                <h2>Autenticação</h2>\n                <div>\n                    <p>\n                        A autenticação na API Kolmeya é feita através de um token de acesso. Este token é único para\n                        cada usuário e deve ser enviado em todas as requisições feitas à API.\n                        O conteúdo do cabeçalho deve iniciar pelos caracteres Bearer (incluindo o espaço) seguido pelo\n                        seu Token da API.\n                    </p>\n                </div>\n                <div class=\"tw-my-3\">\n                    <h4 class=\"tw-text-base tw-font-semibold\">Seu token de autenticação na API</h4>\n                </div>\n            </div>\n\n            <div\n                class=\"tw-flex tw-items-start tw-gap-3 tw-py-4 tw-px-5 tw-my-4 tw-bg-blue-50 tw-rounded-xl tw-border tw-border-blue-100 tw-text-slate-700 tw-bg-opacity-50\">\n                <i class=\"fad mt-1 fa-info tw-text-blue-400\"></i>\n                <div>\n                    <strong class=\"tw-font-semibold\">Validade do token</strong>\n                    <p class=\"tw-text-sm\">\n                        O token de acesso é válido por tempo indeterminado.\n                    </p>\n                </div>\n            </div>\n\n                            <div\n                    class=\"tw-flex tw-items-start tw-gap-3 tw-py-4 tw-px-5 tw-my-4 tw-bg-yellow-50 tw-rounded-xl tw-border tw-border-yellow-100 tw-text-slate-700 tw-bg-opacity-50\">\n                    <i class=\"fad mt-1 fa-exclamation-triangle tw-text-yellow-400\"></i>\n                    <div>\n                        <strong class=\"tw-font-semibold\">Atenção!</strong>\n                        <p class=\"tw-text-sm\">\n                            Gerar um novo token de acesso invalidará o token atual. Certifique-se de atualizar o token\n                            em todas as aplicações que utilizam a API.\n                        </p>\n                    </div>\n                </div>\n                <form action=\"https://kolmeya.com.br/auth/api-token-update\" method=\"POST\" accept-charset=\"UTF-8\"\n                      class=\"tw-space-y-4\">\n                    <input type=\"hidden\" name=\"_token\" value=\"eUaJQYH7E2WjIdykiiBy0ohIUZDesPfPdC6ORndH\" autocomplete=\"off\">                    <div class=\"tw-flex tw-items-center tw-gap-2 tw-mb-3\">\n                        <input\n                            id=\"token\"\n                            type=\"text\"\n                            class=\"tw-flex-1 tw-border tw-border-gray-300 tw-rounded-lg tw-px-3 tw-py-2 tw-bg-gray-100 tw-text-gray-700\"\n                            readonly\n                            value=\"Zv3c2rEJNoGNHRuYbff1ul6PaaLJow73fWvafPYi\"\n                        >\n                        <button\n                            type=\"button\"\n                            class=\"tw-bg-[#3B2155] tw-font-semibold tw-text-white tw-py-2 tw-px-4 tw-rounded-lg focus:tw-outline-none\"\n                            onclick=\"confirm('Tem certeza que deseja gerar um novo token? O token antigo será invalidado.') ? this.form.submit() : null\">\n                            Gerar novo\n                        </button>\n                    </div>\n                </form>\n                    </div>\n    </div>\n\n    <div class=\"tw-rounded-lg tw-mt-4\">\n        <div>\n            <h4 class=\"tw-text-base tw-font-semibold\">\n                Liberação de IPs\n            </h4>\n        </div>\n\n        <div class=\"tw-mt-3\">\n            <div class=\"tw-rounded-lg tw-text-gray-700 tw-mt-4\">\n                <p>\n                    Para garantir a segurança no uso da API, é necessário solicitar a liberação dos endereços IP\n                    utilizados nas requisições.\n                    Entre em contato com nosso suporte para realizar a solicitação.\n                    <a href=\"https://wa.me/5511993313806?text=Olá, gostaria de solicitar a liberação de IP para uso da API\"\n                       target=\"_blank\" class=\"link tw-font-semibold hover:tw-underline\">\n                        Clique aqui\n                    </a> para falar conosco.\n                </p>\n            </div>\n        </div>\n    </div>\n\n    <div class=\"tw-rounded-lg tw-mt-4\">\n        <div>\n            <h4 class=\"tw-text-base tw-font-semibold\">\n                A autenticação é feita enviando o <strong class=\"tw-font-bold\">Token da API</strong> da seguinte forma:\n            </h4>\n        </div>\n\n        <div class=\"tw-mt-3\">\n            <div class=\"tw-bg-gray-100 tw-p-4 tw-rounded-lg tw-border tw-border-gray-200 tw-text-gray-700 tw-mt-4\">\n                <p>\n                    Envie junto à sua requisição o cabeçalho <code\n                        class=\"tw-bg-gray-200 tw-text-red-500 tw-px-1 tw-rounded\">Authorization</code> com o seguinte\n                    conteúdo:\n                </p>\n                <br>\n                <code class=\"tw-bg-gray-200 tw-p-2 tw-rounded tw-block tw-font-mono tw-text-red-500\">\n                    Bearer Zv3c2rEJNoGNHRuYbff1ul6PaaLJow73fWvafPYi\n                </code>\n                            </div>\n\n        </div>\n    </div>\n\n</div>\n","uri":"/articles/autenticacao","type":"html"},{"title":"Webhook Campanhas","data":"<div class=\"tw-rounded-lg\">\n        <div>\n            <div class=\"tw-prose tw-prose-sm !tw-max-w-[1000ch]\">\n                <h2>Webhook para criação de campanhas via API</h2>\n                <div>\n                    <p>\n                        Nessa página você encontra informações das requisições que serão enviadas para o webhook\n                        configurado na criação de uma Campanha (<a style=\"color: #0081cc\"\n                                                                   href=\"/docs/api/operations/sms.jobs.store\">Criar\n                            campanha</a>), com as informações de inválidos, status, respostas e acessos de encurtador.\n                    </p>\n                </div>\n            </div>\n        </div>\n    </div>\n\n    <div class=\"tw-space-y-6 tw-mt-4\">\n        <div class=\"tw-bg-white tw-rounded-lg tw-border\">\n            <div class=\"tw-p-6\">\n                <h3 class=\"tw-text-2xl tw-font-semibold tw-mb-4\">Inválidos</h3>\n                <div class=\"tw-grid tw-grid-cols-2 -px-6 tw-py-4 tw-whitespace-nowrap\">Inválido</td>\n                                    </tr>\n                                                                    <tr>\n                                        <td class=\"tw-px-6 tw-py-4 tw-whitespace-nowrap tw-font-semibold\">8</td>\n                                        <td class=\"tw-px-6 tw-py-4 tw-whitespace-nowrap\">Inválido Anatel</td>\n                                    </tr>\n                                                                    <tr>\n                                        <td class=\"tw-px-6 tw-py-4 tw-whitespace-nowrap tw-font-semibold\">9</td>\n                                        <td class=\"tw-px-6 tw-py-4 tw-whitespace-nowrap\">Telefone duplicado</td>\n                                    </tr>\n                                                                    <tr>\n                                        <td class=\"tw-px-6 tw-py-4 tw-whitespace-nowrap tw-font-semibold\">10</td>\n                                        <td class=\"tw-px-6 tw-py-4 tw-whitespace-nowrap\">Não perturbe (São Paulo)</td>\n                                    </tr>\n                                                                    <tr>\n                                        <td class=\"tw-px-6 tw-py-4 tw-whitespace-nowrap tw-font-semibold\">11</td>\n                                        <td class=\"tw-px-6 tw-py-4 tw-whitespace-nowrap\">Blacklist</td>\n                                    </tr>\n                                                                    <tr>\n                                        <td class=\"tw-px-6 tw-py-4 tw-whitespace-nowrap tw-font-semibold\">12</td>\n                                        <td class=\"tw-px-6 tw-py-4 tw-whitespace-nowrap\">Mensagem inválida</td>\n                                    </tr>\n                                                                    <tr>\n                                        <td class=\"tw-px-6 tw-py-4 tw-whitespace-nowrap tw-font-semibold\">13</td>\n                                        <td class=\"tw-px-6 tw-py-4 tw-whitespace-nowrap\">Rejeitado pela inteligência da Kolmeya</td>\n                                    </tr>\n                                                                </tbody>\n                            </table>\n                        </div>\n                    </div>\n                </div>\n            </div>\n        </div>\n\n        <div class=\"tw-bg-white tw-rounded-lg tw-border\">\n            <div class=\"tw-p-6\">\n                <h3 class=\"tw-text-2xl tw-font-semibold tw-mb-4\">Status</h3>\n                <div class=\"tw-grid tw-grid-cols-2 tw-gap-6\">\n                    <div>\n                        <p class=\"tw-text-gray-600 tw-mb-4\">\n                            Requisição que será enviada para o webhook configurado, com o status da mensagem.\n                        </p>\n                        <pre class=\"tw-bg-gray-50 tw-p-4 tw-rounded-lg tw-text-sm tw-overflow-x-auto\">\n{\n    \"job_id\": //integer,\n    \"job_name\": //string,\n    \"type\": 2 //integer,\n    \"type_description\": \"STATUS\" //string,\n    \"data\": [{\n        \"id\": //integer,\n        \"code\": //integer,\n        \"fullphone\": 11999999999 //integer,\n        \"message\": //string,\n        \"custom_data\": {} // contendo campos do layout selecionado\n    }]\n    \"timestamp\": //integer,\n}\n                    </pre>\n                    </div>\n                    <div>\n                        <div class=\"tw-overflow-x-auto\">\n                            <table class=\"tw-min-w-full tw-divide-y tw-divide-gray-200\">\n                                <thead class=\"tw-bg-gray-50\">\n                                <tr>\n                                    <th class=\"tw-px-6 tw-py-3 tw-text-left tw-text-xs tw-font-medium tw-text-gray-500 tw-uppercase tw-tracking-wider\">\n                                        Código\n                                    </th>\n                                    <th class=\"tw-px-6 tw-py-3 tw-text-left tw-text-xs tw-font-medium tw-text-gray-500 tw-uppercase tw-tracking-wider\">\n                                        Descrição\n                                    </th>\n                                </tr>\n                                </thead>\n                                <tbody class=\"tw-bg-white tw-divide-y tw-divide-gray-200\">\n                                                                    <tr>\n                                        <td class=\"tw-px-6 tw-py-4 tw-whitespace-nowrap tw-font-semibold\">1</td>\n                                        <td class=\"tw-px-6 tw-py-4 tw-whitespace-nowrap\">Tentando enviar</td>\n                                    </tr>\n                                                                    <tr>\n                                        <td class=\"tw-px-6 tw-py-4 tw-whitespace-nowrap tw-font-semibold\">2</td>\n                                        <td class=\"tw-px-6 tw-py-4 tw-whitespace-nowrap\">Enviado</td>\n                                    </tr>\n                                                                    <tr>\n                                        <td class=\"tw-px-6 tw-py-4 tw-whitespace-nowrap tw-font-semibold\">3</td>\n                                        <td class=\"tw-px-6 tw-py-4 tw-whitespace-nowrap\">Entregue</td>\n                                    </tr>\n                                                                    <tr>\n                                        <td class=\"tw-px-6 tw-py-4 tw-whitespace-nowrap tw-font-semibold\">4</td>\n                                        <td class=\"tw-px-6 tw-py-4 tw-whitespace-nowrap\">Não entregue</td>\n                                    </tr>\n                                                                    <tr>\n                                        <td class=\"tw-px-6 tw-py-4 tw-whitespace-nowrap tw-font-semibold\">5</td>\n                                        <td class=\"tw-px-6 tw-py-4 tw-whitespace-nowrap\">Rejeitado no broker</td>\n                                    </tr>\n                                                                    <tr>\n                                        <td class=\"tw-px-6 tw-py-4 tw-whitespace-nowrap tw-font-semibold\">6</td>\n                                        <td class=\"tw-px-6 tw-py-4 tw-whitespace-nowrap\">Expirada</td>\n                                    </tr>\n                                                                    <tr>\n                                        <td class=\"tw-px-6 tw-py-4 tw-whitespace-nowrap tw-font-semibold\">7</td>\n                                        <td class=\"tw-px-6 tw-py-4 tw-whitespace-nowrap\">Rcs não suportado</td>\n                                    </tr>\n                                                                    <tr>\n                                        <td class=\"tw-px-6 tw-py-4 tw-whitespace-nowrap tw-font-semibold\">8</td>\n                                        <td class=\"tw-px-6 tw-py-4 tw-whitespace-nowrap\">Lido</td>\n                                    </tr>\n                                                                    <tr>\n                                        <td class=\"tw-px-6 tw-py-4 tw-whitespace-nowrap tw-font-semibold\">9</td>\n                                        <td class=\"tw-px-6 tw-py-4 tw-whitespace-nowrap\">Enviando sms fallback</td>\n                                    </tr>\n                                                                    <tr>\n                                        <td class=\"tw-px-6 tw-py-4 tw-whitespace-nowrap tw-font-semibold\">10</td>\n                                        <td class=\"tw-px-6 tw-py-4 tw-whitespace-nowrap\">Validation</td>\n                                    </tr>\n                                                                </tbody>\n                            </table>\n                        </div>\n                    </div>\n                </div>\n            </div>\n        </div>\n\n        <div class=\"tw-bg-white tw-rounded-lg tw-border\">\n            <div class=\"tw-p-6\">\n                <h3 class=\"tw-text-2xl tw-font-semibold tw-mb-4\">Respostas</h3>\n                <p class=\"tw-text-gray-600 tw-mb-4\">\n                    Requisição que será enviada para o webhook configurado, com a reposta da mensagem.\n                </p>\n                <pre class=\"tw-bg-gray-50 tw-p-4 tw-rounded-lg tw-text-sm tw-overflow-x-auto\">\n{\n    \"job_id\": //integer,\n    \"job_name\": //string,\n    \"type\": 3 //integer,\n    \"type_description\": \"REPLY\" //string,\n    \"data\": [{\n        \"id\": //integer,\n        \"fullphone\": 11999999999 //integer,\n        \"reply\": //string,\n        \"message\": //string,\n        \"custom_data\": {} // contendo campos do layout selecionado\n    }]\n    \"timestamp\": //integer,\n}\n            </pre>\n            </div>\n        </div>\n\n        <div class=\"tw-bg-white tw-rounded-lg tw-border\">\n            <div class=\"tw-p-6\">\n                <h3 class=\"tw-text-2xl tw-font-semibold tw-mb-4\">Acessos de Encurtador</h3>\n                <p class=\"tw-text-gray-600 tw-mb-4\">\n                    Requisição que será enviada para o webhook configurado, com informações de acessos no encurtador.\n                </p>\n                <pre class=\"tw-bg-gray-50 tw-p-4 tw-rounded-lg tw-text-sm tw-overflow-x-auto\">\n{\n    \"job_id\": //integer,\n    \"job_name\": //string,\n    \"type\": 4 //integer,\n    \"type_description\": \"SHORTENER\" //string,\n    \"data\": [{\n        \"id\": //integer,\n        \"fullphone\": 11999999999 //integer,\n        \"message\": //string,\n        \"useragent\": //string,\n        \"ip\": //string,\n        \"custom_data\": {} // contendo campos do layout selecionado\n    }]\n    \"timestamp\": //integer,\n}\n            </pre>\n            </div>\n        </div>\n\n        <div class=\"tw-bg-white tw-rounded-lg tw-border\">\n            <div class=\"tw-p-6\">\n                <h3 class=\"tw-text-2xl tw-font-semibold tw-mb-4\">Rejeição por homologação</h3>\n                <p class=\"tw-text-gray-600 tw-mb-4\">\n                    Requisição que será enviada para o webhook configurado, caso a campanha seja rejeitada por\n                    homologação.\n                </p>\n                <pre class=\"tw-bg-gray-50 tw-p-4 tw-rounded-lg tw-text-sm tw-overflow-x-auto\">\n{\n    \"job_id\": //integer,\n    \"job_name\": //string,\n    \"type\": 5 //integer,\n    \"type_description\": \"REJECTED_BY_HOMOLOGATION\" //string,\n    \"data\": {\n        \"message\": \"Campanha rejeitada por não passar pelos critérios de homologação.\"//string,\n    }\n    \"timestamp\": //integer,\n}\n            </pre>\n            </div>\n        </div>\n\n        <div class=\"tw-bg-white tw-rounded-lg tw-border\">\n            <div class=\"tw-p-6\">\n                <h3 class=\"tw-text-2xl tw-font-semibold tw-mb-4\">Rejeição</h3>\n                <p class=\"tw-text-gray-600 tw-mb-4\">\n                    Requisição que será enviada para o webhook configurado, caso a campanha seja rejeitada manualmente\n                    por um usuário da propria conta do cliente.\n                </p>\n                <pre class=\"tw-bg-gray-50 tw-p-4 tw-rounded-lg tw-text-sm tw-overflow-x-auto\">\n{\n    \"job_id\": //integer,\n    \"job_name\": //string,\n    \"type\": 6 //integer,\n    \"type_description\": \"REJECTED\" //string,\n    \"data\": {\n        \"message\":  \"Campanha rejeitada pelo usuário. @nome_do_usuário(@email_do_usuário)\" //string,\n    }\n    \"timestamp\": //integer,\n}\n            </pre>\n            </div>\n        </div>\n    </div>\n","uri":"/articles/webhook-campanhas","type":"html"},{"title":"Webhook Requisições","data":"<div class=\"tw-rounded-lg\">\n    <div>\n        <div class=\"tw-prose tw-prose-sm !tw-max-w-[1000ch]\">\n            <h2>Webhook para requisições via API</h2>\n            <div>\n                <p>\n                    Nessa página você encontra informações das requisições que serão enviadas para o webhook\n                    configurado\n                    na criação de um request (<a style=\"color: #0081cc\" href=\"/docs/api/operations/sms.store\">Envios\n                        de\n                        SMS</a>), com as informações de status, respostas e rejeições de homologação.\n                </p>\n            </div>\n        </div>\n    </div>\n</div>\n\n<div class=\"tw-space-y-6 tw-mt-4\">\n    <!-- Retorno Status -->\n    <div class=\"tw-bg-white tw-rounded-lg tw-border\">\n        <div class=\"tw-p-6\">\n            <h3 class=\"tw-text-2xl tw-font-semibold tw-mb-4\">Retorno Status</h3>\n            <div class=\"tw-grid tw-grid-cols-2 tw-gap-6\">\n                <div>\n                    <p class=\"tw-text-gray-600 tw-mb-4\">\n                        Requisição enviada para o webhook quando há atualização no status de entrega das mensagens.\n                    </p>\n                    <pre class=\"tw-bg-gray-50 tw-p-4 tw-rounded-lg tw-text-sm tw-overflow-x-auto\">\n{\n  \"id\": // string,\n  \"reference\": // string | null,\n  \"messages\": [\n    {\n      \"id\": // string,\n      \"reference\": // string | null,\n      \"status_code\": // integer,\n      \"status\": // string\n    }\n  ]\n}\n                    </pre>\n                </div>\n                <div>\n                    <!-- Campos Principais -->\n                    <div class=\"tw-mb-6\">\n                        <div class=\"tw-overflow-x-auto\">\n                            <table class=\"tw-min-w-full tw-divide-y tw-divide-gray-200\">\n                                <thead class=\"tw-bg-gray-50\">\n                                <tr>\n                                    <th class=\"tw-px-6 tw-py-3 tw-text-left tw-text-xs tw-font-medium tw-text-gray-500 tw-tracking-wider\">\n                                        <span class=\"tw-uppercase\">Campo</span>\n                                    </th>\n                                    <th class=\"tw-px-6 tw-py-3 tw-text-left tw-text-xs tw-font-medium tw-text-gray-500 tw-tracking-wider\">\n                                        <span class=\"tw-uppercase\">Descrição</span>\n                                    </th>\n                                </tr>\n                                </thead>\n                                <tbody class=\"tw-bg-white tw-divide-y tw-divide-gray-200\">\n                                <tr>\n                                    <td class=\"tw-px-6 tw-py-4 tw-whitespace-nowrap tw-font-semibold tw-text-sm\">id</td>\n                                    <td class=\"tw-px-6 tw-py-4 tw-text-sm\">ID único da requisição</td>\n                                </tr>\n                                <tr>\n                                    <td class=\"tw-px-6 tw-py-4 tw-whitespace-nowrap tw-font-semibold tw-text-sm\">\n                                        reference\n                                    </td>\n                                    <td class=\"tw-px-6 tw-py-4 tw-text-sm\">Referência informada na requisição (se\n                                        houver)\n                                    </td>\n                                </tr>\n                                <tr>\n                                    <td class=\"tw-px-6 tw-py-4 tw-whitespace-nowrap tw-font-semibold tw-text-sm\">\n                                        messages.id\n                                    </td>\n                                    <td class=\"tw-px-6 tw-py-4 tw-text-sm\">ID único da mensagem</td>\n                                </tr>\n                                <tr>\n                                    <td class=\"tw-px-6 tw-py-4 tw-whitespace-nowrap tw-font-semibold tw-text-sm\">\n                                        messages.reference\n                                    </td>\n                                    <td class=\"tw-px-6 tw-py-4 tw-text-sm\">Referência da mensagem (se houver)</td>\n                                </tr>\n                                <tr>\n                                    <td class=\"tw-px-6 tw-py-4 tw-whitespace-nowrap tw-font-semibold tw-text-sm\">\n                                        messages.status_code\n                                    </td>\n                                    <td class=\"tw-px-6 tw-py-4 tw-text-sm\">Código numérico do status de entrega</td>\n                                </tr>\n                                <tr>\n                                    <td class=\"tw-px-6 tw-py-4 tw-whitespace-nowrap tw-font-semibold tw-text-sm\">\n                                        messages.status\n                                    </td>\n                                    <td class=\"tw-px-6 tw-py-4 tw-text-sm\">Descrição textual do status de entrega</td>\n                                </tr>\n                                </tbody>\n                            </table>\n                        </div>\n                    </div>\n\n                    <!-- Status Codes -->\n                    <div>\n                        <div class=\"tw-overflow-x-auto\">\n                            <table class=\"tw-min-w-full tw-divide-y tw-divide-gray-200\">\n                                <thead class=\"tw-bg-gray-50\">\n                                <tr>\n                                    <th class=\"tw-px-6 tw-py-3 tw-text-left tw-text-xs tw-font-medium tw-text-gray-500 tw-tracking-wider\">\n                                        <span class=\"tw-uppercase\">Código</span> (messages.status_code)\n                                    </th>\n                                    <th class=\"tw-px-6 tw-py-3 tw-text-left tw-text-xs tw-font-medium tw-text-gray-500 tw-tracking-wider\">\n                                        <span class=\"tw-uppercase\">Status</span> (
