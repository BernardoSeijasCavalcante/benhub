<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BenHub - Comunicação Interna</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/chat.css">
  <style>
    /* Estilos Adicionais para Chat Interno */
    .module-nav {
      display: flex;
      background: rgba(255, 255, 255, 0.05);
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }

    .module-nav a {
      flex: 1;
      text-align: center;
      padding: 12px;
      color: var(--text-secondary);
      text-decoration: none;
      font-weight: 500;
      transition: all 0.3s ease;
    }

    .module-nav a:hover {
      background: rgba(255, 255, 255, 0.1);
      color: var(--text-primary);
    }

    .module-nav a.active {
      background: rgba(255, 193, 7, 0.2);
      color: var(--accent-gold);
      border-bottom: 2px solid var(--accent-gold);
    }

    .group-avatar {
      border-radius: 12px !important;
    }

    /* Modals */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(5px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }

    .modal-overlay.active {
      opacity: 1;
      pointer-events: all;
    }

    .modal-content {
      background: var(--bg-secondary);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 16px;
      padding: 24px;
      width: 400px;
      max-width: 90%;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
      max-height: 90vh;
      display: flex;
      flex-direction: column;
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .modal-header h3 {
      margin: 0;
    }

    .close-modal {
      background: none;
      border: none;
      color: white;
      cursor: pointer;
      font-size: 20px;
    }

    .form-group {
      margin-bottom: 16px;
    }

    .form-group label {
      display: block;
      margin-bottom: 8px;
      color: var(--text-secondary);
      font-size: 14px;
    }

    .form-group input,
    .form-group textarea,
    .form-group select {
      width: 100%;
      padding: 12px;
      background: rgba(0, 0, 0, 0.2);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      color: white;
    }

    .btn-primary {
      background: var(--primary-color);
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 8px;
      cursor: pointer;
      width: 100%;
      font-weight: 600;
    }

    .chat-footer .actions {
      display: flex;
      gap: 10px;
      align-items: center;
      margin-right: 10px;
    }

    .btn-attach {
      background: none;
      border: none;
      color: var(--text-secondary);
      cursor: pointer;
      padding: 8px;
      border-radius: 50%;
      transition: background 0.3s;
    }

    .btn-attach:hover {
      background: rgba(255, 255, 255, 0.1);
      color: white;
    }

    .message-image {
      max-width: 250px;
      border-radius: 8px;
      margin-top: 5px;
      cursor: pointer;
    }

    .message-file {
      display: flex;
      align-items: center;
      gap: 10px;
      background: rgba(0, 0, 0, 0.2);
      padding: 10px;
      border-radius: 8px;
      margin-top: 5px;
      text-decoration: none;
      color: var(--accent-gold);
      cursor: pointer;
    }

    .members-list {
      margin-top: 15px;
      max-height: 200px;
      overflow-y: auto;
    }

    .member-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }

    .member-info {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    /* File Viewer */
    #file-viewer-body iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
    #file-viewer-body img {
      max-width: 100%;
      max-height: 100%;
      display: block;
      margin: 0 auto;
      object-fit: contain;
      background-color: var(--bg-secondary);
    }
    .mammoth-docx-container {
      padding: 40px;
      color: #333;
      font-family: Arial, sans-serif;
      line-height: 1.6;
    }

    /* NOVIDADES WHATSAPP-LIKE */
    
    /* Search Results */
    #search-results {
      max-height: 150px;
      overflow-y: auto;
      background: rgba(0,0,0,0.3);
      border-radius: 8px;
      margin: 8px 15px;
      display: none;
    }
    #search-results .search-item {
      padding: 10px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    #search-results .search-item:hover {
      background: rgba(255,255,255,0.05);
    }
    #search-results .btn-add-contact {
      background: var(--primary-color);
      color: #fff;
      border: none;
      padding: 4px 8px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
    }

    /* Pinned Messages Bar */
    .pinned-messages-bar {
      background: rgba(255, 255, 255, 0.05);
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      padding: 10px 15px;
      display: flex;
      flex-direction: column;
      gap: 5px;
      max-height: 100px;
      overflow-y: auto;
    }
    .pinned-message-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(0,0,0,0.2);
      padding: 8px;
      border-radius: 6px;
      border-left: 3px solid var(--accent-gold);
      font-size: 13px;
    }
    .pinned-message-item .content-preview {
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-right: 10px;
      color: var(--text-secondary);
    }
    .pinned-message-item .unpin-btn {
      background: none;
      border: none;
      color: var(--danger, #ff6b6b);
      cursor: pointer;
    }

    /* Message Actions Menu */
    .message {
      position: relative;
    }
    .message-actions-trigger {
      position: absolute;
      top: 5px;
      right: -25px;
      background: none;
      border: none;
      color: var(--text-secondary);
      cursor: pointer;
      opacity: 0;
      transition: opacity 0.2s;
    }
    .message.customer .message-actions-trigger {
      right: auto;
      left: -25px;
    }
    .message:hover .message-actions-trigger {
      opacity: 1;
    }
    .message-actions-menu {
      position: absolute;
      top: 25px;
      right: -25px;
      background: var(--bg-secondary);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 6px;
      z-index: 10;
      display: none;
      flex-direction: column;
      box-shadow: 0 4px 10px rgba(0,0,0,0.3);
    }
    .message.customer .message-actions-menu {
      right: auto;
      left: -25px;
    }
    .message-actions-menu button {
      background: none;
      border: none;
      color: white;
      padding: 8px 12px;
      text-align: left;
      cursor: pointer;
      font-size: 13px;
      white-space: nowrap;
    }
    .message-actions-menu button:hover {
      background: rgba(255,255,255,0.1);
    }
    
    /* Forwarded label */
    .forwarded-label {
      font-size: 11px;
      color: var(--text-secondary);
      margin-bottom: 4px;
      font-style: italic;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    /* Reactions */
    .reactions-container {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      margin-top: 4px;
    }
    .reaction-badge {
      background: rgba(0,0,0,0.3);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 2px 6px;
      font-size: 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .reaction-badge:hover {
      background: rgba(255,255,255,0.1);
    }
    .reaction-picker {
      position: absolute;
      bottom: 100%;
      right: 0;
      background: var(--bg-secondary);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 20px;
      padding: 5px;
      display: none;
      gap: 5px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.3);
      z-index: 11;
    }
    .message.customer .reaction-picker {
      right: auto;
      left: 0;
    }
    .reaction-picker button {
      background: none;
      border: none;
      font-size: 18px;
      cursor: pointer;
      border-radius: 50%;
      width: 30px;
      height: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .reaction-picker button:hover {
      background: rgba(255,255,255,0.1);
      transform: scale(1.2);
    }

    /* Drag & Drop Overlay */
    .drag-overlay {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(2px);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 50;
      border: 2px dashed var(--accent-gold);
      border-radius: inherit;
    }
    .drag-overlay.active {
      display: flex;
    }
    .drag-overlay-content {
      text-align: center;
      color: var(--accent-gold);
      font-size: 24px;
      pointer-events: none;
    }

    /* Contact Item Context Menu / Buttons */
    .contact-item {
      position: relative;
    }
    .contact-actions {
      display: none;
      gap: 5px;
    }
    .contact-item:hover .contact-actions {
      display: flex;
    }
    .contact-actions button {
      background: none;
      border: none;
      color: var(--text-secondary);
      cursor: pointer;
      font-size: 14px;
    }
    .contact-actions button:hover {
      color: white;
    }
    
    /* Pinned Icon in contact */
    .pin-icon {
      font-size: 12px;
      margin-left: auto;
      margin-right: 5px;
    }

    /* Forward Modal Selection List */
    .forward-list {
      flex: 1;
      overflow-y: auto;
      margin: 15px 0;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
    }
    .forward-item {
      display: flex;
      align-items: center;
      padding: 10px;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      cursor: pointer;
    }
    .forward-item:hover {
      background: rgba(255,255,255,0.05);
    }
    .forward-item input[type="checkbox"] {
      margin-right: 15px;
      transform: scale(1.2);
    }
    .forward-item .contact-name {
      color: white;
    }

  </style>
</head>

<body>
  <div class="app-container">

    <!-- Painel Lateral Esquerdo: Contatos -->
    <aside class="sidebar-left glass-panel">
      <!-- Navegação de Módulos -->
      <nav class="module-nav">
        <a href="sms_dispatch.html" id="tab-sms">Disparo SMS</a>
        <a href="internal_chat.html" class="active" id="tab-internal">Equipe Interna</a>
      </nav>

      <div class="sidebar-header">
        <div class="user-profile">
          <div class="avatar" id="operator-avatar" style="cursor: pointer;" title="Alterar Foto de Perfil">O</div>
          <input type="file" id="profile-photo-input" style="display: none;" accept="image/*">
          <div class="user-info">
            <span class="user-name" id="operator-name">Carregando...</span>
            <span class="status-indicator online">Online</span>
          </div>
          <button id="admin-btn" class="btn-icon" title="Painel Admin" style="display: none;">⚙️</button>
          <button id="logout-btn" class="btn-icon" title="Sair">🚪</button>
        </div>
        <div class="search-bar" style="display: flex; gap: 8px;">
          <input type="text" id="search-contact" placeholder="Pesquisar..." style="flex:1;" autocomplete="off">
          <button id="new-group-btn" class="btn-icon" title="Novo Grupo"
            style="background: rgba(255,255,255,0.1); border-radius: 8px;">➕</button>
        </div>
      </div>

      <!-- Área para resultados da pesquisa global -->
      <div id="search-results"></div>

      <div class="contacts-list" id="contacts-list">
        <div class="loading-contacts">Carregando contatos...</div>
      </div>
    </aside>

    <!-- Painel Central: Chat -->
    <main class="chat-area glass-panel" style="position: relative;">
      
      <!-- Drag & Drop Overlay -->
      <div class="drag-overlay" id="drag-overlay">
        <div class="drag-overlay-content">
          <div>📁</div>
          Solte os arquivos aqui para enviar
        </div>
      </div>

      <!-- Estado Vazio -->
      <div class="empty-state" id="empty-state">
        <div class="logo">
          <span class="logo-text">Comunicação Interna</span>
          <div class="logo-dot"></div>
        </div>
        <p>Selecione um chat para interagir com a equipe</p>
      </div>

      <!-- Área de Chat Ativa -->
      <div class="active-chat" id="active-chat" style="display: none; height: 100%; flex-direction: column;">
        <header class="chat-header">
          <div class="chat-contact-info">
            <div class="avatar" id="chat-avatar">?</div>
            <div class="contact-details">
              <span class="contact-name" id="chat-contact-name">Chat</span>
              <span class="contact-phone" id="chat-contact-desc"></span>
            </div>
          </div>
          <button id="toggle-details-btn" class="btn-icon" title="Ver Detalhes do Grupo/Usuário">ℹ️</button>
        </header>

        <!-- Pinned Messages Area -->
        <div id="pinned-messages-container" class="pinned-messages-bar" style="display: none;">
          <!-- Pinned messages list injected here -->
        </div>

        <div class="chat-messages" id="chat-messages" style="flex: 1;">
          <!-- Mensagens renderizadas aqui -->
        </div>

        <footer class="chat-footer">
          <form id="send-message-form" style="display: flex; width: 100%;">
            <div class="actions">
              <input type="file" id="file-input" style="display: none;"
                accept="image/*, .pdf, .doc, .docx, .xls, .xlsx, .zip">
              <button type="button" id="btn-attach-file" class="btn-attach" title="Anexar Arquivo">📎</button>
            </div>
            <input type="text" id="message-input" placeholder="Digite uma mensagem..." autocomplete="off">
            <button type="submit" class="btn-send">
              <svg viewBox="0 0 24 24" width="24" height="24">
                <path fill="currentColor" d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path>
              </svg>
            </button>
          </form>
        </footer>
      </div>
    </main>

    <!-- Painel Lateral Direito: Detalhes -->
    <aside class="sidebar-right glass-panel" id="sidebar-right">
      <div class="details-header">
        <h3 id="details-title">Detalhes</h3>
        <button id="close-details-btn" class="btn-icon">✖</button>
      </div>
      <div class="details-body" id="details-body">
        <!-- Renderizado dinamicamente -->
      </div>
    </aside>

  </div>

  <!-- Modals -->
  <!-- Novo Grupo Modal -->
  <div class="modal-overlay" id="modal-new-group">
    <div class="modal-content">
      <div class="modal-header">
        <h3>Novo Grupo</h3>
        <button class="close-modal" id="close-new-group">✖</button>
      </div>
      <form id="form-new-group">
        <div class="form-group">
          <label>Nome do Grupo</label>
          <input type="text" id="group-name" required>
        </div>
        <div class="form-group">
          <label>Descrição</label>
          <textarea id="group-desc" rows="2"></textarea>
        </div>
        <div class="form-group">
          <label>Cor (Hex)</label>
          <input type="color" id="group-color" value="#00d2ff">
        </div>
        <button type="submit" class="btn-primary">Criar Grupo</button>
      </form>
    </div>
  </div>

  <!-- Adicionar Membro Modal -->
  <div class="modal-overlay" id="modal-add-member">
    <div class="modal-content">
      <div class="modal-header">
        <h3>Adicionar Membro</h3>
        <button class="close-modal" id="close-add-member">✖</button>
      </div>
      <form id="form-add-member">
        <div class="form-group">
          <label>Pesquise e selecione</label>
          <select id="select-new-member" required>
            <!-- Preenchido via JS -->
          </select>
        </div>
        <button type="submit" class="btn-primary">Adicionar</button>
      </form>
    </div>
  </div>

  <!-- Modal Encaminhar Mensagem -->
  <div class="modal-overlay" id="modal-forward">
    <div class="modal-content" style="height: 60vh;">
      <div class="modal-header">
        <h3>Encaminhar para...</h3>
        <button class="close-modal" id="close-forward">✖</button>
      </div>
      <input type="text" id="forward-search" placeholder="Buscar na sua lista..." style="padding: 10px; border-radius: 6px; border: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.2); color: white;">
      <div class="forward-list" id="forward-list">
        <!-- Contatos e grupos para encaminhar -->
      </div>
      <button id="btn-confirm-forward" class="btn-primary">Encaminhar (0)</button>
    </div>
  </div>

  <!-- Visualizador de Arquivo Modal -->
  <div class="modal-overlay" id="modal-file-viewer">
    <div class="modal-content" id="file-viewer-content" style="width: 80vw; max-width: 900px; height: 80vh; padding: 0;">
      <div class="modal-header" style="padding: 15px 20px; border-bottom: 1px solid rgba(255, 255, 255, 0.1); margin-bottom: 0;">
        <h3 id="file-viewer-title" style="white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-right: 20px;">Visualizador</h3>
        <div style="display: flex; gap: 15px; align-items: center;">
          <a id="download-file-btn" href="#" download class="btn-icon" title="Baixar Arquivo" style="color: white; text-decoration: none; font-size: 18px; display: none;">⬇️</a>
          <button class="close-modal" id="close-file-viewer">✖</button>
        </div>
      </div>
      <div id="file-viewer-body" style="flex: 1; overflow: auto; background: #fff; border-bottom-left-radius: 16px; border-bottom-right-radius: 16px; position: relative;">
      </div>
    </div>
  </div>

  <!-- Modal Imagem Expandida -->
  <div class="modal-overlay" id="modal-image-viewer">
    <div class="modal-content" style="width: auto; height: auto; max-width: 90vw; max-height: 90vh; padding: 10px; background: transparent; border: none; box-shadow: none; display: flex; align-items: center; justify-content: center;">
      <button class="close-modal" id="close-image-viewer" style="position: absolute; top: -30px; right: 0; font-size: 24px; color: #fff;">✖</button>
      <img id="expanded-image" src="" style="max-width: 100%; max-height: 85vh; border-radius: 8px; object-fit: contain;">
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
  <script src="js/internal_chat.js"></script>
</body>

</html>
