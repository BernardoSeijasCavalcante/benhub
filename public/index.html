<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BenHub - Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/login.css">
</head>
<body>
  <div class="login-container">
    <div class="login-box glass-panel">
      <div class="logo" style="text-align: center; margin-bottom: 20px;">
        <img src="logo.png" alt="BenConsig Logo" style="max-width: 150px; height: auto;" />
      </div>
      <h2>Bem-vindo de volta</h2>
      <p class="subtitle">Faça login para acessar o sistema de atendimento</p>
      
      <form id="login-form">
        <div class="input-group">
          <label for="email">E-mail</label>
          <input type="email" id="email" required placeholder="seu@email.com">
        </div>
        
        <div class="input-group">
          <label for="password">Senha</label>
          <input type="password" id="password" required placeholder="••••••••">
        </div>

        <div id="error-message" class="error-message"></div>
        
        <button type="submit" class="btn-primary" id="login-btn">
          <span>Entrar</span>
          <div class="loader" style="display: none;"></div>
        </button>
      </form>
    </div>
  </div>

  <!-- Modal para captura de telefone -->
  <div id="phone-modal" class="modal-overlay" style="display: none;">
    <div class="login-box glass-panel modal-box">
      <h2>Confirmação de Telefone</h2>
      <p class="subtitle">Como este é seu primeiro acesso, por favor informe seu número de telefone para continuar.</p>
      
      <form id="phone-form">
        <div class="input-group">
          <label for="phone-input">Telefone (WhatsApp)</label>
          <input type="text" id="phone-input" required placeholder="(00) 00000-0000" maxlength="15">
        </div>

        <div id="phone-error-message" class="error-message"></div>
        
        <button type="submit" class="btn-primary" id="phone-btn">
          <span>Salvar e Continuar</span>
          <div class="loader" style="display: none;"></div>
        </button>
      </form>
    </div>
  </div>

  <script src="js/login.js"></script>
</body>
</html>
